<svg viewBox="0 0 420 480" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background glow circle -->
  <circle cx="210" cy="240" r="185" fill="#F5E3DC" opacity="0.45"/>
  <circle cx="210" cy="240" r="145" fill="#EDE0EF" opacity="0.25"/>

  <!-- Dashed decorative ring -->
  <circle cx="210" cy="215" r="140" stroke="#E8705A" stroke-width="1.2" stroke-dasharray="5 9" opacity="0.22"/>

  <!-- ── Botanical Left ── -->
  <!-- Main large leaf -->
  <path d="M 68 290 C 32 245 28 168 72 128 C 82 185 76 245 98 290 Z" fill="#9DB89B" opacity="0.78"/>
  <line x1="68" y1="290" x2="72" y2="128" stroke="#7A9E78" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Side leaflet top -->
  <path d="M 70 168 C 38 152 30 118 55 102 C 65 130 68 152 80 165 Z" fill="#9DB89B" opacity="0.60"/>
  <line x1="70" y1="168" x2="55" y2="102" stroke="#7A9E78" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Side leaflet bottom -->
  <path d="M 80 235 C 48 225 40 195 62 178 C 70 202 75 220 92 232 Z" fill="#9DB89B" opacity="0.55"/>

  <!-- ── Botanical Right ── -->
  <!-- Main large leaf -->
  <path d="M 352 290 C 388 245 392 168 348 128 C 338 185 344 245 322 290 Z" fill="#9DB89B" opacity="0.78"/>
  <line x1="352" y1="290" x2="348" y2="128" stroke="#7A9E78" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Side leaflet top -->
  <path d="M 350 168 C 382 152 390 118 365 102 C 355 130 352 152 340 165 Z" fill="#9DB89B" opacity="0.60"/>
  <line x1="350" y1="168" x2="365" y2="102" stroke="#7A9E78" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Side leaflet bottom -->
  <path d="M 340 235 C 372 225 380 195 358 178 C 350 202 345 220 328 232 Z" fill="#9DB89B" opacity="0.55"/>

  <!-- Small accent leaf bottom-left -->
  <path d="M 118 370 C 98 345 100 315 122 300 C 126 325 122 348 135 368 Z" fill="#B8D0B6" opacity="0.65"/>
  <!-- Small accent leaf bottom-right -->
  <path d="M 302 370 C 322 345 320 315 298 300 C 294 325 298 348 285 368 Z" fill="#B8D0B6" opacity="0.65"/>

  <!-- ── Face shape ── -->
  <!-- Neck -->
  <rect x="191" y="295" width="38" height="46" rx="19" fill="#F5E3DC"/>
  <!-- Face oval -->
  <ellipse cx="210" cy="205" rx="82" ry="104" fill="#F5E3DC"/>
  <!-- Ear left -->
  <ellipse cx="129" cy="210" rx="9" ry="13" fill="#EDCFC0"/>
  <!-- Ear right -->
  <ellipse cx="291" cy="210" rx="9" ry="13" fill="#EDCFC0"/>
  <!-- Inner ear detail -->
  <ellipse cx="291" cy="210" rx="5" ry="8" fill="#E4C0AF"/>
  <ellipse cx="129" cy="210" rx="5" ry="8" fill="#E4C0AF"/>

  <!-- ── Hair ── -->
  <path d="M 128 185
           C 128 95 155 72 210 68
           C 265 72 292 95 292 185
           C 285 148 265 128 210 125
           C 155 128 135 148 128 185 Z"
        fill="#C9956A"/>
  <!-- Hair highlight -->
  <path d="M 180 80 Q 210 72 240 80 Q 225 90 210 88 Q 195 90 180 80 Z" fill="#D4A574" opacity="0.6"/>

  <!-- ── Eyes ── -->
  <!-- Left eyebrow -->
  <path d="M 163 163 Q 180 157 196 160" stroke="#8B6045" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Right eyebrow -->
  <path d="M 224 160 Q 240 157 257 163" stroke="#8B6045" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Left eyelid shape -->
  <path d="M 162 182 Q 180 174 198 182 Q 180 192 162 182 Z" fill="#1C1714"/>
  <!-- Right eyelid shape -->
  <path d="M 222 182 Q 240 174 258 182 Q 240 192 222 182 Z" fill="#1C1714"/>
  <!-- Eye shine left -->
  <circle cx="170" cy="180" r="3.5" fill="white" opacity="0.85"/>
  <!-- Eye shine right -->
  <circle cx="230" cy="180" r="3.5" fill="white" opacity="0.85"/>
  <!-- Lower lash line -->
  <path d="M 162 183 Q 180 189 198 183" stroke="#5A3E2E" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M 222 183 Q 240 189 258 183" stroke="#5A3E2E" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- ── Nose ── -->
  <path d="M 210 200 L 203 228 Q 210 233 217 228 Z" stroke="#D4A078" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- ── Cheek blush ── -->
  <ellipse cx="162" cy="226" rx="22" ry="12" fill="#E8705A" opacity="0.10"/>
  <ellipse cx="258" cy="226" rx="22" ry="12" fill="#E8705A" opacity="0.10"/>

  <!-- ── Lips ── -->
  <!-- Upper lip -->
  <path d="M 183 248 Q 196 241 210 244 Q 224 241 237 248 Q 224 256 210 254 Q 196 256 183 248 Z" fill="#E8705A" opacity="0.75"/>
  <!-- Lower lip highlight -->
  <path d="M 185 250 Q 210 262 235 250 Q 222 265 210 266 Q 198 265 185 250 Z" fill="#D4604A" opacity="0.55"/>
  <!-- Lip highlight -->
  <ellipse cx="204" cy="258" rx="6" ry="2.5" fill="white" opacity="0.25"/>

  <!-- ── Earrings ── -->
  <circle cx="291" cy="222" r="5" fill="#E8705A" opacity="0.70"/>
  <circle cx="291" cy="232" r="3" fill="#E8705A" opacity="0.50"/>
  <circle cx="129" cy="222" r="5" fill="#E8705A" opacity="0.70"/>
  <circle cx="129" cy="232" r="3" fill="#E8705A" opacity="0.50"/>

  <!-- ── Collar / Clothing ── -->
  <path d="M 110 360 Q 160 335 210 340 Q 260 335 310 360 L 330 420 L 90 420 Z" fill="#EDE0EF" opacity="0.80"/>
  <!-- White collar V -->
  <path d="M 210 340 L 192 390 L 210 396 L 228 390 Z" fill="white" opacity="0.60"/>
  <!-- Collar stitch line -->
  <path d="M 210 340 L 195 385" stroke="#C8BEE0" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 210 340 L 225 385" stroke="#C8BEE0" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- ── Floating sparkles & dots ── -->
  <!-- Star top-left -->
  <g transform="translate(138,82)" opacity="0.65">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#E8705A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#E8705A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#E8705A" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#E8705A" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Star top-right -->
  <g transform="translate(282,82)" opacity="0.65">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#E8705A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#E8705A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#E8705A" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#E8705A" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Small star left -->
  <g transform="translate(58,148)" opacity="0.45">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#E8705A" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#E8705A" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- Small star right -->
  <g transform="translate(362,148)" opacity="0.45">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#E8705A" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#E8705A" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- Floating dots -->
  <circle cx="48" cy="230" r="6" fill="#DFD8F0" opacity="0.75"/>
  <circle cx="372" cy="230" r="6" fill="#DFD8F0" opacity="0.75"/>
  <circle cx="92" cy="340" r="4.5" fill="#E8705A" opacity="0.30"/>
  <circle cx="328" cy="340" r="4.5" fill="#E8705A" opacity="0.30"/>
  <circle cx="155" cy="44" r="4" fill="#E8705A" opacity="0.35"/>
  <circle cx="265" cy="44" r="4" fill="#E8705A" opacity="0.35"/>
  <circle cx="210" cy="36" r="3" fill="#DFD8F0" opacity="0.60"/>
  <circle cx="40" cy="290" r="3" fill="#C8BEE0" opacity="0.55"/>
  <circle cx="380" cy="290" r="3" fill="#C8BEE0" opacity="0.55"/>

  <!-- Bottom soft wave -->
  <path d="M 0 430 Q 105 410 210 418 Q 315 426 420 410 L 420 480 L 0 480 Z" fill="#F5E3DC" opacity="0.35"/>

</svg>
